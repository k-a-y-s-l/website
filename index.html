  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      color: #111;
      line-height: 1.5;
    }

    header {
      padding: 10px 10px;
      position: fixed;
    }

    h1 {
      font-size: 24px;
      font-weight: normal;
      margin: 0;
    }

    .intro {
      padding: 0 10px 10px;
      max-width: 600px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0px;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      padding: 10px 10px;
      font-size: 14px;
      position: absolute;
    }

    a {
      color: inherit;
      text-decoration: underline;
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

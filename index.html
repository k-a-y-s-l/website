header,

<script>
const images = [
  "images/img1.jpg",
  "images/img2.jpg",
  "images/img3.jpg",
  "images/img4.jpg",
  "images/img5.jpg",
  "images/img6.jpg"
];

const random = images[Math.floor(Math.random() * images.length)];

const img = new Image();
img.src = random;

img.onload = function() {
  document.body.style.backgroundImage = `url(${random})`;
  document.body.style.opacity = "1";
};

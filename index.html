<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kaysl</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      color: #000000;
      line-height: 1.5;

       background-size: cover;
       background-position: center;
       background-repeat: no-repeat;
       background-attachment: fixed;


      opacity: 0;
  transition: opacity 0.6s ease;
    }

header,
footer {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  text-align: center;
  z-index: 10;
}

    header {
      padding: 10px 10px;
      position: fixed;
      text-align: center;
    }

    h1 {
      font-size: 30px;
      font-weight: normal;
      margin: 0;
    }

    .intro {
        padding: 60px 10px 10px;
        max-width: 600px;
        z-index: 10;
        color: rgb(0, 0, 0);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0px;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
    }

.side {
  position: fixed;
  font-size: 14px;
  z-index: 10;
  white-space: nowrap;
}

.side.right {
  right: -130px;
  top: 50%;
  transform: translateY(-50%) rotate(90deg);
  transform-origin: center center;
  font-size: 16px;
  padding: 10px;
}

.side.left {
  left: -100px;
  top: 50%;
  transform: translateY(-50%) rotate(-90deg);
  transform-origin: center center;
  font-size: 16px;
}

@media (max-width: 700px) {
  .side { display: none; }
}

    footer {
        bottom: 10px;
       padding: 0px;
       font-size: 16px;
    }

    a {
      color: inherit;
      text-decoration: underline;
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
   
  </style>
</head>



<body>

<header>
  <h1>kaysl</h1>
</header>

<div class="side left">Visual creator based in Switzerland</div>
<div class="side right">Art direction, graphic design & illustration</div>






<footer>
  
    <a href="mailto:contact@kaysl.ch">contact@kaysl.ch</a>     —      
    <a href="https://www.instagram.com/_____kaysl_____">instagram</a>     —      
    076 521 30 77
  
</footer>

<script>
const images = [
  "images/img1.JPG",
  "images/img2.JPG",
  "images/img3.JPG",
  "images/img4.JPG",
  "images/img5.JPG",
  "images/img6.JPG"
];

const random = images[Math.floor(Math.random() * images.length)];

const img = new Image();
img.src = random;

img.onload = function() {
  document.body.style.backgroundImage = `url(${random})`;
  document.body.style.opacity = "1";
};
</script>


</body>
</html>
